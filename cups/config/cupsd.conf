#
# cupsd.conf – CUPS Scheduler Configuration for Docker deployment
# (MayInKTS project)
#
# Security note: Admin operations are open to all Docker-internal connections.
# External access to port 6315 should be restricted via firewall/UFW on the host.
# The Next.js application provides its own role-based authentication.
#

# ─── Logging ─────────────────────────────────────────────────────────────────
# Send logs to stderr so Docker captures them with `docker logs`
ErrorLog stderr
AccessLog stderr
LogLevel warn
MaxLogSize 0

# ─── Network ─────────────────────────────────────────────────────────────────
Listen /var/run/cups/cups.sock
Listen 0.0.0.0:631

# ─── General ─────────────────────────────────────────────────────────────────
Browsing Off
BrowseLocalProtocols none
DefaultAuthType Basic
DefaultEncryption Never
WebInterface Yes
ServerName cups-server
ServerAlias *

Timeout 300
KeepAlive On
KeepAliveTimeout 60
MaxClients 100

# ─── Access Control ───────────────────────────────────────────────────────────
# Allow all connections from any address (Docker internal network + web UI)
<Location />
  Order allow,deny
  Allow all
</Location>

# Admin endpoint: no authentication required.
# The Next.js app is the only caller for IPP admin operations and has its own auth.
<Location /admin>
  Order allow,deny
  Allow all
</Location>

# Config changes require auth to prevent accidental misconfiguration via web UI
<Location /admin/conf>
  AuthType Default
  Require user @SYSTEM print
  Order allow,deny
  Allow all
</Location>

# ─── Printer / Job Policy ─────────────────────────────────────────────────────
<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  # Anyone can submit print jobs
  <Limit Create-Job Print-Job Print-URI Validate-Job>
    Order deny,allow
    Allow all
  </Limit>

  # Job management requires ownership or system access
  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job CUPS-Get-Document>
    Require user @OWNER @SYSTEM
    Order deny,allow
    Allow all
  </Limit>

  # Printer management – Require admin
  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default CUPS-Get-Devices>
    AuthType Default
    Require user @SYSTEM printadmin admin
    Order deny,allow
    Allow all
  </Limit>

  # Printer state changes – Require admin
  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM printadmin admin
    Order deny,allow
    Allow all
  </Limit>

  # Job cancellation requires ownership
  <Limit Cancel-Job CUPS-Authenticate-Job>
    Require user @OWNER @SYSTEM
    Order deny,allow
    Allow all
  </Limit>

  # Default: allow
  <Limit All>
    Order deny,allow
    Allow all
  </Limit>
</Policy>
