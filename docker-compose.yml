version: '3.8'

services:
  # 1. Ứng dụng Web Next.js
  nextjs-app:
    image: ghcr.io/saodonga/aptmayin:latest
    container_name: printer_server_app
    restart: always
    ports:
      - "8028:3500"
    env_file:
      - .env
    environment:
      - GOTENBERG_URL=http://gotenberg:3000
    volumes:
      - temp-print-files:/app/temp
      - print-data:/app/data
      - cups-socket:/var/run/cups
    depends_on:
      - cups-server
      - gotenberg

  # 1.5. Chuyển đổi định dạng văn bản sang PDF (Office, TXT, HTML)
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: printer_gotenberg
    restart: always
    ports:
      - "3000:3000"
    command:
      - "gotenberg"
      - "--api-port=3000"

  # 2. CUPS Print Server (Đầu não kết nối máy in USB và máy in mạng)
  cups-server:
    image: olbat/cupsd:latest
    container_name: printer_cups_server
    privileged: true # Cần thiết để nhận cổng USB trên máy chủ Linux Host
    restart: always
    ports:
      - "6315:631"
    volumes:
      - /var/run/dbus:/var/run/dbus  # Hỗ trợ tự động dò quét máy in
      - /dev/bus/usb:/dev/bus/usb    # Map cổng USB máy host vào container
      - cups-config:/etc/cups        # Lưu trữ cấu hình máy in CUPS
      - cups-spool:/var/spool/cups   # Lưu trữ hàng đợi in
      - cups-socket:/var/run/cups    # Socket dùng chung để bypass password auth
    environment:
      - ADMIN_PASSWORD=admin_secret

volumes:
  temp-print-files:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${PWD}/temp'
  print-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${PWD}/data'
  cups-config:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${PWD}/cups/config'
  cups-spool:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${PWD}/cups/spool'
  cups-socket:
