<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Không có kết nối – Máy In Tự Xa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: #1e293b;
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 44px; height: 44px; color: #7c3aed; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .75rem; }
    p  { color: #94a3b8; font-size: 1rem; line-height: 1.6; max-width: 320px; }
    button {
      margin-top: 2rem;
      padding: .75rem 1.75rem;
      border-radius: .75rem;
      background: #7c3aed;
      color: #fff;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M6 18 3.375 15.375A2.625 2.625 0 0 1 6 10.5h12a2.625 2.625 0 0 1 2.625 4.875L18 18M6 18h12M6 18v-6m12 6v-6m-6-6v6m0 0H9m3 0h3"/>
    </svg>
  </div>
  <h1>Không có kết nối Internet</h1>
  <p>Bạn đang ngoại tuyến. Vui lòng kiểm tra kết nối mạng và thử lại.</p>
  <button onclick="window.location.reload()">Thử lại</button>
</body>
</html>
